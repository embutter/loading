<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>빅시티자유공원</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#f4f8fc;}
body{position:relative;}
.bg{
position:fixed;width:100%;height:100%;
background:linear-gradient(rgba(255,255,255,0.72),rgba(255,255,255,0.82)),
url("https://www.dropbox.com/scl/fi/w97um3irj3ar15wfo71qp/20260517230706_1.jpg?rlkey=2fo618ctwkvrbxg40i2p6r4yj&st=jiqdoiiq&dl=1");
background-size:cover;background-position:center;filter:blur(1px);transform:scale(1.02);}
.topbar{
position:absolute;top:0;left:0;width:100%;height:70px;
background:rgba(255,255,255,.88);border-bottom:1px solid #dce6f0;
display:flex;align-items:center;padding:0 28px;backdrop-filter:blur(8px);}
.gmodlogo{display:flex;align-items:center;gap:12px;}
.gbox{
width:42px;height:42px;background:#4ea3ff;border-radius:10px;
display:flex;justify-content:center;align-items:center;
color:white;font-size:28px;font-weight:bold;}
.logo-text{font-size:15px;color:#4d90d9;font-weight:600;}
.container{
position:absolute;width:100%;height:100%;
display:flex;align-items:center;padding-left:50px;}
.panel{
width:470px;background:rgba(255,255,255,.48);
border:1px solid rgba(255,255,255,.7);
backdrop-filter:blur(12px);border-radius:24px;
padding:35px;box-shadow:0 20px 60px rgba(0,0,0,.08);}
.server-type{color:#8291a6;font-size:18px;margin-bottom:8px;}
.server-name{
font-size:44px;font-weight:800;color:#49a0ff;
line-height:1.1;margin-bottom:20px;}
.line{
width:60px;height:4px;background:#49a0ff;
border-radius:999px;margin-bottom:25px;}
.status{font-size:24px;color:#3f9dff;font-weight:700;}
.substatus{
color:#77879d;font-size:16px;
margin-top:8px;margin-bottom:22px;}
.progress-bg{
width:100%;height:10px;background:#dfe8f2;
border-radius:999px;overflow:hidden;}
.progress{
width:0%;height:100%;
background:linear-gradient(90deg,#65b6ff,#2b90ff);
border-radius:999px;transition:.25s;}
.percent{
margin-top:10px;color:#4ea3ff;
font-weight:700;font-size:16px;}
.info{
margin-top:25px;border-top:1px solid #dce6f0;
padding-top:20px;color:#708199;
line-height:1.8;font-size:15px;}
.footer{
position:absolute;bottom:0;width:100%;height:55px;
background:rgba(255,255,255,.8);
border-top:1px solid #dce6f0;
display:flex;align-items:center;
padding:0 24px;color:#5c88b8;font-size:14px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="topbar">
<div class="gmodlogo">
<div class="gbox">g</div>
<div class="logo-text">garry's mod</div>
</div>
</div>

<div class="container">
<div class="panel">
<div class="server-type">Sandbox Server</div>
<div class="server-name">빅시티자유공원</div>
<div class="line"></div>

<div class="status" id="status">서버 접속 중...</div>
<div class="substatus" id="substatus">서버 콘텐츠 다운로드 중</div>

<div class="progress-bg">
<div class="progress" id="bar"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="info">
SteamID: <span id="steamid">불러오는 중...</span><br>
맵: <span id="map">gm_bigcity</span><br>
모드: Sandbox
</div>
</div>
</div>

<div class="footer">💡 자유롭게 건축하고 놀 수 있는 샌드박스 서버입니다</div>

<script>
let currentProgress = 0;

function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode){
document.getElementById("steamid").innerText = steamid;
document.getElementById("map").innerText = mapname;
}

function DownloadingFile(file){
document.getElementById("status").innerText = "콘텐츠 다운로드 중";
document.getElementById("substatus").innerText = file;
}

function SetStatusChanged(status){
document.getElementById("status").innerText = status;
}

setInterval(() => {
if(currentProgress < 95){ currentProgress += Math.random() * 6; }
currentProgress = Math.min(currentProgress,95);
document.getElementById("bar").style.width = currentProgress + "%";
document.getElementById("percent").innerText = Math.floor(currentProgress) + "%";
},500);
</script>
</body>
</html>
